<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>기쁨의 50일</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1a1006;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Noto Sans KR',sans-serif}

.screen{width:min(390px,100vw);height:min(844px,100vh);position:relative;overflow:hidden;background:#FDF6EC}
.page{position:absolute;inset:0;transition:transform .5s cubic-bezier(.77,0,.18,1),opacity .5s ease;will-change:transform;overflow:hidden}
.page.hidden-left {transform:translateX(-100%);opacity:0;pointer-events:none}
.page.hidden-right{transform:translateX(100%);opacity:0;pointer-events:none}
.page.active{transform:translateX(0);opacity:1}

/* ══ 애니메이션 ══ */
@keyframes floatUp{from{opacity:0;transform:translateX(-50%) translateY(18px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}

/* ══════════════════════════════
   표지
══════════════════════════════ */
#cover{display:flex;flex-direction:column;background:#FDF6EC}
.cv-top{background:#3A2A1A;flex:0 0 50%;position:relative;overflow:visible}
.gold-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#5a3800,#D4AA5A,#B8892A,#D4AA5A,#5a3800);z-index:10}
.church-lbl{position:absolute;top:10%;left:0;right:0;text-align:center;font-size:13px;letter-spacing:4px;color:#C49A3A;font-weight:400;font-family:'Noto Serif KR',serif;z-index:5}
.f-main{position:absolute;left:50%;bottom:-18%;transform:translateX(-50%);width:68%;z-index:6;filter:drop-shadow(0 6px 20px rgba(0,0,0,.5));animation:floatUp 1.2s cubic-bezier(.22,1,.36,1) both}
.f-tl{position:absolute;top:-4%;left:-6%;width:28%;opacity:.75;z-index:4;animation:fadeIn 1.4s .1s both}
.f-tr{position:absolute;top:-2%;right:-6%;width:28%;opacity:.75;z-index:4;animation:fadeIn 1.4s .15s both}
.cv-bottom{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;padding:12% 20px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch;gap:0}
.f-bl{position:absolute;bottom:-6%;left:-6%;width:32%;opacity:.6;animation:fadeIn 1s .7s both;pointer-events:none}
.f-br{position:absolute;bottom:-5%;right:-6%;width:32%;opacity:.6;animation:fadeIn 1s .75s both;pointer-events:none}
.t1{font-family:'Noto Serif KR',serif;font-size:clamp(20px,5.5vw,26px);font-weight:700;color:#3A2A1A;letter-spacing:1px;animation:up .8s .3s both}
.t2{font-family:'Noto Serif KR',serif;font-size:clamp(46px,13vw,62px);font-weight:700;color:#C4520A;line-height:1;animation:up .8s .4s both}
.deco{display:flex;align-items:center;gap:10px;margin:8px 0 3px;animation:up .8s .5s both}
.dl{width:56px;height:1.5px;background:linear-gradient(90deg,transparent,#B8892A)}
.dr{width:56px;height:1.5px;background:linear-gradient(90deg,#B8892A,transparent)}
.sub{font-size:clamp(10px,2.8vw,12px);color:#6B4C2A;letter-spacing:3px;margin-top:4px;animation:up .8s .55s both}
.dt{font-size:clamp(9px,2.3vw,11px);color:#9A7A5A;letter-spacing:1px;margin-top:4px;animation:up .8s .6s both}
.start-btn{margin-top:12px;padding:9px 26px;background:#B8892A;color:#FDF6EC;border:none;border-radius:20px;font-size:12px;letter-spacing:2px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;animation:up .8s .65s both;-webkit-tap-highlight-color:transparent;font-weight:400;flex-shrink:0}
.start-btn:active{background:#9A7020}
.cv-scripture{width:100%;margin-top:auto;padding-top:12px;background:#F5E9D4;border-radius:8px;padding:11px 13px 9px 16px;border-left:3.5px solid #B8892A;animation:up .8s .7s both;flex-shrink:0;position:relative;z-index:2;margin-top:12px}
.cv-sv{font-family:'Noto Serif KR',serif;font-size:clamp(9px,2.2vw,11px);color:#6B4C2A;font-style:italic;line-height:1.65}
.cv-sr{font-size:clamp(8px,2vw,10px);color:#9A7A5A;text-align:right;margin-top:3px}

/* ══════════════════════════════
   묵상 목록
══════════════════════════════ */
#list{display:flex;flex-direction:column;background:#FDF6EC}
.list-header{background:linear-gradient(135deg,#2c1f0e,#5a3a1a);padding:16px 20px 12px;text-align:center;position:relative;flex-shrink:0}
.list-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#D4AA5A,transparent)}
.lh-back{position:absolute;left:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#C49A3A;font-size:20px;cursor:pointer;-webkit-tap-highlight-color:transparent;line-height:1;padding:4px}
.lh-title{font-size:13px;letter-spacing:4px;color:#D4AA5A;font-weight:300}
.lh-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;margin-top:3px;font-weight:300}

.list-scroll{flex:1;overflow-y:auto;padding:12px 16px 20px;-webkit-overflow-scrolling:touch}
.month-label{font-size:10px;letter-spacing:3px;color:#B8892A;font-weight:400;margin:16px 0 8px 2px}
.month-label:first-child{margin-top:0}
.day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:4px}
.day-item{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;position:relative;transition:transform .15s}
.day-item:active{transform:scale(.94)}
.day-item.unlocked{background:#fff;box-shadow:0 2px 8px rgba(58,42,26,.1)}
.day-item.today{background:#B8892A;box-shadow:0 3px 12px rgba(184,137,42,.4)}
.day-item.past{background:#f7f0e6}
.day-item.locked{background:#ede8e0;cursor:default}
.day-item.locked:active{transform:none}
.di-num{font-size:16px;font-weight:700;line-height:1}
.day-item.unlocked .di-num,.day-item.past .di-num{color:#3A2A1A}
.day-item.today .di-num{color:#fff}
.day-item.locked .di-num{color:#c0b4a4}
.di-date{font-size:8px;margin-top:2px;font-weight:300}
.day-item.unlocked .di-date,.day-item.past .di-date{color:#9A7A5A}
.day-item.today .di-date{color:rgba(255,255,255,.8)}
.day-item.locked .di-date{color:#c0b4a4}
.di-lock{font-size:9px;position:absolute;top:5px;right:6px;color:#c0b4a4}
.di-dot{width:5px;height:5px;border-radius:50%;background:#D4AA5A;position:absolute;bottom:5px}
.day-item.today .di-dot{background:rgba(255,255,255,.7)}

/* ══════════════════════════════
   묵상 내용
══════════════════════════════ */
#devotion{display:flex;flex-direction:column;background:#FDF6EC}
.app-header{background:linear-gradient(135deg,#2c1f0e,#5a3a1a);padding:16px 20px 12px;text-align:center;position:relative;flex-shrink:0}
.app-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#D4AA5A,transparent)}
.ah-back{position:absolute;left:16px;top:50%;transform:translateY(-50%);background:none;border:none;color:#C49A3A;font-size:20px;cursor:pointer;-webkit-tap-highlight-color:transparent;line-height:1;padding:4px}
.ah-title{font-size:13px;letter-spacing:4px;color:#D4AA5A;font-weight:300}
.ah-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:2px;margin-top:3px;font-weight:300}

.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;flex-shrink:0}
.nav-btn{width:36px;height:36px;background:none;border:1.5px solid #d4b896;border-radius:50%;color:#7a5c3a;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.nav-btn:active{background:#F5E9D4}
.nav-btn:disabled{opacity:.3;cursor:default}
.date-badge{text-align:center}
.db-date{font-size:11px;letter-spacing:3px;color:#7a5c3a;font-weight:300}
.db-num{font-size:22px;font-weight:700;color:#B8892A;line-height:1}
.db-lbl{font-size:10px;color:#7a5c3a;font-weight:300;letter-spacing:2px}

.scroll-area{flex:1;overflow-y:auto;padding:0 16px 16px;-webkit-overflow-scrolling:touch}

/* 잠금 화면 */
.lock-card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(58,42,26,.09);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 30px;text-align:center;margin-top:8px}
.lock-icon{font-size:42px;margin-bottom:16px;animation:pulse 2s infinite}
.lock-title{font-family:'Noto Serif KR',serif;font-size:17px;font-weight:700;color:#3A2A1A;margin-bottom:10px}
.lock-msg{font-size:13px;color:#9A7A5A;line-height:1.8}
.lock-date{font-size:11px;color:#B8892A;letter-spacing:2px;margin-top:10px;font-weight:400}

/* 내용 카드 */
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(58,42,26,.09);margin-top:8px;animation:up .4s ease both}
.card-top{height:4px;background:linear-gradient(90deg,#B8892A,#D4AA5A,#B8892A)}
.card-head{padding:20px 22px 14px;border-bottom:1px solid #f0e8dc;text-align:center}
.dev-date{font-size:10px;color:#7a5c3a;letter-spacing:3px;margin-bottom:8px;font-weight:300}
.dev-title{font-size:18px;font-weight:700;color:#3a2a1a;line-height:1.5}
.title-deco{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:12px}
.tdl{flex:1;height:1px;max-width:50px;background:linear-gradient(90deg,transparent,#d4b896)}
.tdr{flex:1;height:1px;max-width:50px;background:linear-gradient(90deg,#d4b896,transparent)}
.card-body{padding:20px 22px}
.dev-text{font-size:15px;line-height:2.0;color:#2c1f0e;word-break:keep-all;white-space:pre-wrap}
.dev-text em{font-style:normal;color:#B8892A;font-weight:600}
.scripture-box{margin:18px 0 0;background:linear-gradient(135deg,#fdf0de,#faf3e8);border-left:3px solid #B8892A;border-radius:0 6px 6px 0;padding:12px 14px}
.sc-label{font-size:9px;letter-spacing:3px;color:#B8892A;margin-bottom:5px}
.sc-text{font-size:13px;line-height:1.9;color:#6b4c2a;font-style:italic;word-break:keep-all}
.sc-ref{font-size:11px;color:#9a7a5a;text-align:right;margin-top:5px;font-style:normal}

.prog-wrap{padding:0 16px 16px;flex-shrink:0}
.prog-row{display:flex;justify-content:space-between;font-size:10px;color:#9a7a5a;font-weight:300;margin-bottom:6px}
.prog-bar{height:3px;background:#e8ddd0;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#B8892A,#D4AA5A);border-radius:2px;transition:width .8s ease}
</style>
</head>
<body>
<div class="screen">

<!-- ══ 표지 ══ -->
<div id="cover" class="page active">
  <div class="cv-top">
    <div class="church-lbl">무학교회 청년부 7공동체</div>
    <div class="f-tl"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" id="sm1"></svg></div>
    <div class="f-tr"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" id="sm2"></svg></div>
    <div class="f-main"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" id="lg1"></svg></div>
    <div class="gold-bar"></div>
  </div>
  <div class="cv-bottom">
    <div class="f-bl"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" id="sm3"></svg></div>
    <div class="f-br"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" id="sm4"></svg></div>
    <div class="t1">기쁨의</div>
    <div class="t2">50일</div>
    <div class="deco">
      <div class="dl"></div>
      <svg width="18" height="18" viewBox="0 0 24 24"><rect x="10" y="2" width="4" height="20" rx="1" fill="#B8892A"/><rect x="3" y="8" width="18" height="4" rx="1" fill="#B8892A"/></svg>
      <div class="dr"></div>
    </div>
    <div class="sub">오순절 묵상집</div>
    <div class="dt">2026. 4. 5 — 5. 24</div>
    <button class="start-btn" onclick="goPage('list')">묵상 시작하기 ›</button>
    <div class="cv-scripture">
      <div class="cv-sv">"씨를 뿌리며 울며 나가는 자는 반드시 기쁨으로 그 곡식 단을 가지고 돌아오리로다"</div>
      <div class="cv-sr">— 시편 126:6</div>
    </div>

  </div>
</div>

<!-- ══ 묵상 목록 ══ -->
<div id="list" class="page hidden-right">
  <div class="list-header">
    <button class="lh-back" onclick="goPage('cover')">‹</button>
    <div class="lh-title">기쁨의 50일</div>
    <div class="lh-sub">무학교회 청년부 7공동체</div>
  </div>
  <div class="list-scroll" id="list-scroll"></div>
  <div style="text-align:center;padding:14px 20px 20px;font-family:'Noto Serif KR',serif;font-size:11px;color:#B8892A;letter-spacing:1px;line-height:1.8;flex-shrink:0;">
    주의 사랑 안에 뿌리박아, 충만함에 이르는 7공동체
  </div>
</div>

<!-- ══ 묵상 내용 ══ -->
<div id="devotion" class="page hidden-right">
  <div class="app-header">
    <button class="ah-back" onclick="goPage('list')">‹</button>
    <div class="ah-title">기쁨의 50일</div>
    <div class="ah-sub">무학교회 청년부 7공동체</div>
  </div>
  <div class="nav-bar">
    <button class="nav-btn" id="btn-prev" onclick="changeDay(-1)">&#8249;</button>
    <div class="date-badge">
      <div class="db-date" id="db-date">04 · 05</div>
      <div class="db-num" id="db-num">1</div>
      <div class="db-lbl">DAY</div>
    </div>
    <button class="nav-btn" id="btn-next" onclick="changeDay(1)">&#8250;</button>
  </div>
  <div class="scroll-area" id="scroll-area">
    <!-- 내용 렌더 영역 -->
  </div>
  <div class="prog-wrap">
    <div class="prog-row"><span>오늘의 묵상</span><span id="prog-txt">1 / 50</span></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:2%"></div></div>
  </div>
</div>

</div>

<script>
/* ══════════════════════════════
   꽃 SVG 생성
══════════════════════════════ */
function makePetals(cx,cy,layers){
  let s='';
  layers.forEach(l=>{
    for(let i=0;i<l.n;i++){
      const a=(360/l.n)*i+(l.off||0);
      const c=l.cols[i%l.cols.length];
      s+=`<ellipse cx="${cx}" cy="${cy-l.r}" rx="${l.rx}" ry="${l.ry}" fill="${c}" transform="rotate(${a},${cx},${cy})" opacity="${l.op||1}"/>`;
    }
  });
  return s;
}
function drawFlower(id,cx,cy,sc){
  const L=[
    {n:14,r:58*sc,rx:10*sc,ry:22*sc,cols:['#D44800','#E8620A','#C83A00','#F08030'],off:0,op:.95},
    {n:12,r:46*sc,rx:9*sc,ry:18*sc,cols:['#F08030','#F5A623','#E86820'],off:13},
    {n:10,r:36*sc,rx:8*sc,ry:15*sc,cols:['#F5A623','#FBCA3A','#F0AA20'],off:0},
    {n:8, r:26*sc,rx:7*sc,ry:12*sc,cols:['#FBCA3A','#FFD966'],off:22},
    {n:6, r:17*sc,rx:5*sc,ry:9*sc, cols:['#FFD966','#FFE680'],off:10},
  ];
  const el=document.getElementById(id);
  el.innerHTML=makePetals(cx,cy,L)
    +`<circle cx="${cx}" cy="${cy}" r="${14*sc}" fill="#5A2800"/>`
    +`<circle cx="${cx}" cy="${cy}" r="${9*sc}"  fill="#7B3F00"/>`
    +`<circle cx="${cx}" cy="${cy}" r="${5*sc}"  fill="#9B5A00"/>`;
}
drawFlower('lg1',120,120,1.0);
['sm1','sm2','sm3','sm4'].forEach(id=>drawFlower(id,100,100,0.72));

/* ══════════════════════════════
   날짜 데이터 (4/5 ~ 5/24, 50일)
══════════════════════════════ */
const WEEKDAY=['일','월','화','수','목','금','토'];
function getDay50(){
  const days=[];
  const start=new Date(2026,3,5); // 4월 5일
  for(let i=0;i<50;i++){
    const d=new Date(start);d.setDate(start.getDate()+i);
    const m=d.getMonth()+1,dd=d.getDate(),w=WEEKDAY[d.getDay()];
    days.push({
      index:i,
      dayNum:i+1,
      date:d,
      display:`${String(m).padStart(2,'0')} · ${String(dd).padStart(2,'0')}`,
      label:`${m}/${dd}`,
      fullDate:`2026년 ${m}월 ${dd}일 ${w}요일`,
      month:m
    });
  }
  return days;
}
const DAYS=getDay50();

/* ══════════════════════════════
   묵상 내용
   (내용이 없는 날은 null → 추후 채워주세요)
══════════════════════════════ */
const CONTENT={
  // ── Day 5 : 4월 9일 ──
  5:{
    title:"언제나 승리하시는 주님",
    body:`소망의 하나님 아버지, 새 아침에 나를 깨우시니 감사합니다.\n\n오늘 해야 하는 일들이 순조롭게 하소서. 그것이 무슨 일이든 주님의 도우심이 필요합니다. 내가 일을 망친다 하더라도 주님이 새롭게 하실 줄 믿습니다. 나의 실패가 주님의 실패가 아니기에 오늘도 소망을 갖습니다. 주님은 언제나 승리하는 분이십니다. 그 믿음으로 오늘도 새로운 시작을 선포합니다.\n\n오늘 내 손에 들린 일을 하는 데 있어 늘 하던 일이 아니라 새로운 일처럼 임하게 하소서. 내게 맡겨진 일이 있음에 감사하고 즐거웠던 처음의 마음을 회복하기 원합니다. 업무뿐만 아니라 모든 사람들과의 첫 만남을 생각하며 감사하는 하루 되게 하소서. 나의 주 소망이 되시는 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"내가 달려갈 길과 주 예수께 받은 사명 곧 하나님의 은혜의 복음을 증언하는 일을 마치려 함에는 나의 생명조차 조금도 귀한 것으로 여기지 아니하노라",
    ref:"— 사도행전 20:24"
  },
  // ── Day 1 : 4월 5일 ──
  1:{
    title:"오늘을 허락하심에 감사합니다",
    body:`나의 하나님 아버지, 새 하루를 시작하게 하셔서, 새로운 기회를 주시니 감사합니다.\n\n오늘이 오지 않을 수도 있는데, 항상 당연하게 생각하고 감사함이 없었습니다. 오늘이 주어졌음에 감사하며 열심히 살게 하소서. 오늘이라는 시간뿐만 아니라, 오늘을 사는 데 필요한 모든 것을 주심에 감사합니다. 모두 받았는데, 내 생각과 약간 다르다고 짜증내지 않게 하소서.\n\n할 수 있다면 모든 사람들과 화목하기 원합니다. 자존심이 조금만 상해도 참지 못하고 분노하는 어리석은 나를 용서하소서. 나의 분노로는 아무 유익도 얻을 수 없음을 기억하게 하소서. 이 작은 하나를 내려놓고 나의 믿음을 드러내는 하루 되기 원합니다. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"감사로 제사를 드리는 자가 나를 영화롭게 하나니 그의 행위를 옳게 하는 자에게 내가 하나님의 구원을 보이리라",
    ref:"— 시편 50:23"
  },
  // ── Day 2 : 4월 6일 ──
  2:{
    title:"주님 안에 있음이 가장 큰 기쁨입니다",
    body:`거룩하신 하나님, 이 아침에 주님을 찬양합니다.\n\n오늘도 주님이 나의 아버지 되시기에 기뻐합니다. 주님이 내 안에, 내가 주님 안에 있음이 가장 큰 기쁨입니다. 주님 안에 있을 때 나는 언제나 안전합니다. 주님이 내 안에 계시다면 나는 정한 길을 벗어나지 않을 것입니다.\n\n비록 나의 가는 길이 보이지 않을지라도 이 길 끝에는 반드시 선하신 하나님의 선물이 있음을 믿습니다. 사람과 상황을 보며 실망하고 조급한 마음을 품기보다 보이지 않는 하나님을 바라보며 주님의 음성에 귀 기울이게 하소서.\n\n오늘도 주님의 거룩하심을 닮아가기 원합니다. 내 안에 있는 주님의 형상이 나로 세상과 구별되게 하소서. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"오직 내 말을 듣는 자는 평안히 살며 재앙의 두려움이 없이 안전하리라",
    ref:"— 잠언 1:33"
  },
  // ── Day 3 : 4월 7일 ──
  3:{
    title:"나의 몸과 마음과 영혼을 회복하소서",
    body:`생명의 하나님 아버지, 오늘도 나를 살리시는 은혜에 감사합니다.\n\n주님이 생명의 주인이십니다. 모든 회복은 주님께로부터 옴을 고백합니다. 오늘 나의 몸을 회복시켜 주소서. 주님께서 원래 만드신 그 건강한 몸으로 회복되어 육체가 나의 삶을 방해하는 일이 없게 하소서. 또 나의 마음을 회복시켜 주소서. 건강한 생각을 하게 하시고, 긍정적인 시선으로 세상을 보게 하소서. 그리고 나의 영혼을 회복시켜 주소서. 죄에 더렵혀진 영혼을 보혈로 깨끗하게 하소서. 정결한 영혼으로 하나님 말씀을 듣기 원합니다. 나의 전부를 다해 주님을 사랑하기 원합니다.\n\n나로 인해 다른 사람도 회복되는 역사가 있기 원합니다. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"너희 안에서 착한 일을 시작하신 이가 그리스도 예수의 날까지 이루실 줄을 우리는 확신하노라",
    ref:"— 빌립보서 1:6"
  },
  // ── Day 4 : 4월 8일 ──
  4:{
    title:"견고한 평안을 지니게 하소서",
    body:`은혜 주시는 하나님 아버지, 오늘도 성실하게 나와 함께하시니 감사합니다.\n\n주님이 주시는 평안이 가득한 하루 되기를 원합니다. 주님께서 "내가 너와 함께하리라." 약속하셨으니 믿음으로 평안히 가게 하소서. 작은 사건에 흔들리는 연약한 평안이 아니라, 어떤 사건에도 흔들리지 않는, 하나님의 말씀에 깊이 뿌리내린 평안을 소유하게 하소서. 참된 평안을 가진 자의 견고함으로 옳은 길에 서게 하시고 나의 손을 펼쳐 사람들을 품게 하소서. 모든 언행을 통해 하나님의 성품을 드러내는 참된 크리스천 되기 원합니다.\n\n담대한 마음으로 주님을 기대하며 오늘을 시작합니다. 나의 연약함을 담당하신 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"평안을 너희에게 끼치노니 곧 나의 평안을 너희에게 주노라 내가 너희에게 주는 것은 세상이 주는 것과 같지 아니하니라 너희는 마음에 근심하지도 말고 두려워하지도 말라",
    ref:"— 요한복음 14:27"
  },
  // ── Day 6 : 4월 10일 ──
  6:{
    title:"세상의 통치자이신 주님",
    body:`만물 다스리는 왕이신 아버지, 오늘도 나의 왕이 되심에 감사합니다.\n\n새롭게 시작된 이날의 주인도 주님이심을 고백합니다. 나의 아버지가 왕이시니 당당하게 안심하며 하루를 시작합니다.\n\n세상이 아닌 주님의 통치를 받는 하루 되기 원합니다. 눈에 보이는 권위에 아부하지 않게 하시고, 보이지 않는 하늘의 권위에 순종함으로 겉과 속이 언제나 겸손하고 올바르게 하소서. 나의 삶이 아버지 앞에 온전할 때 세상 앞에 분노할 것도 비굴할 것도 없음을 고백합니다.\n\n주님은 믿는 자뿐 아니라 믿지 않는 자에게도 왕이십니다. 온 세상을 통치하시는 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"나의 하나님, 나의 주여 펼치고 깨셔서 나를 공판하시며 나의 송사를 다스리소서",
    ref:"— 시편 35:23"
  },
  // ── Day 7 : 4월 11일 ──
  7:{
    title:"모든 것이 가능하다는 믿음",
    body:`선하신 하나님, 새 아침을 선하신 아버지와 시작하게 하시니 감사합니다.\n\n모든 두려움을 떨치고 모두 가능하다는 믿음으로 출발하기 원합니다. 주님 안에 있다면 못 할 것이 없습니다. 내가 주님 안에 있게 하소서. 주님이 내 안에 계심을 믿습니다. 이 믿음으로 오늘도 주님과 동행하겠습니다.\n\n나를 선한 길로 인도하시는 아버지, 때로 내가 잘못된 길을 선택해도 합력하여 선을 이루실 줄 믿습니다. 오늘 나의 선택 가운데 임하여 주소서. 내가 가는 길 끝에 언제나 주님의 선하심이 있음을 믿습니다. 이 믿음이 나로 고난의 때를 버티게 합니다. 끝까지 나를 인도하실 주님을 사랑합니다. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"",
    ref:""
  },
  // ── Day 8 : 4월 12일 ──
  8:{
    title:"오늘이 주님을 가장 사랑하는 날입니다",
    body:`나를 사랑하시는 하나님, 내가 사랑을 고백하기 전부터 이미 나를 사랑하신 아버지를 찬양합니다. 나의 고백은 언제나 늦고 부족하고 연약하지만, 오늘을 시작하며 다시 주님을 사랑한다고 고백합니다.\n\n오늘 하루, 하나님과 나의 사랑을 막는 수많은 방해들을 물리쳐 주소서. 세상 근심으로 주님을 원망하지 않게 하시고, 혼자서도 살 수 있다며 아버지를 잊지 않게 하소서. 모든 영적인 공격과 불신을 조장하는 상황 속에서 주님을 놓치지 않게 하소서.\n\n일평생 주님을 온전히 사랑하기 원합니다. 오늘이 지금까지 삶에서 주님을 가장 사랑하는 날이 되게 하소서. 내일도 또 그런 날이 되게 하소서. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"높음이나 깊음이나 다른 어떤 피조물이라도 우리를 우리 주 그리스도 예수 안에 있는 하나님의 사랑에서 끊을 수 없으리라",
    ref:"— 로마서 8:39"
  },
  // ── Day 9 : 4월 13일 ──
  9:{
    title:"넉넉히 주님을 믿고 따라갑니다",
    body:`나의 앞에 계신 아버지, 오늘도 내가 눈 뜨기를 기다리며 나를 바라보신 주님 감사합니다.\n\n나는 오늘 무슨 일이 일어날지 전혀 알지 못합니다. 나는 주님의 도우심이 필요한 연약한 존재입니다. 그러나 때로 조급한 마음에 주님보다 앞서 가려 했습니다. 주님이 일하시기를 기다리지 못하고, 잘못될까 전전긍긍했습니다. 주님이 하신다면 잘못될 리 없는데, 늘 불안해한 것을 회개합니다. 마음이 성급한 것은 믿음이 없기 때문입니다. 이제 넉넉히 주님을 믿고 따라가기 원합니다.\n\n주님을 믿음으로 주님을 바라보며 주님의 속도를 맞추겠습니다. 나를 안전하게 인도하시는 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"하나님은 나의 견고한 요새시며 나를 안전한 곳으로 인도하시며",
    ref:"— 사무엘하 22:33"
  },
  // ── Day 10 : 4월 14일 ──
  10:{
    title:"하나님의 형상을 회복하는 하루",
    body:`회복의 하나님 아버지, 신선한 아침을 주셔서 감사합니다.\n\n오늘 내가 회복할 것은 돈도 사람도 아니고, 하나님의 형상임을 믿습니다. 내가 먼저 중요하게 회복해야 할 것은 하나님의 마음인 줄 믿습니다. 아버지의 마음을 내 안에 가득 채우는 하루 되게 하소서. 하나님의 형상을 회복하는 것이 내 일생 가장 중요한 일임을 알게 하소서.\n\n오늘도 하나님을 닮고자 하나님을 바라봅니다. 나의 생각과 마음을 빼앗아 가는 세상 유혹 앞에서 아버지의 은혜를 굳건히 붙잡고 묵상하게 하소서. 오늘도 주님을 의지합니다. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"내게 주신 모든 은혜를 내가 여호와께 무엇으로 보답할까",
    ref:"— 시편 116:12"
  },
  // ── Day 11 : 4월 15일 ──
  11:{
    title:"주님의 진리로 나를 채우소서",
    body:`진리의 하나님 아버지, 주님을 생각하며 하루를 시작하게 하시니 감사합니다.\n\n언제나 온전한 진리이신 주님께 감사와 영광을 드립니다. 오늘 그 진리 앞에 순종하게 하시고, 흔들린 나의 길을 진리 앞에서 다시 추스르게 하소서.\n\n진리를 온전히 품을 수 있는 깨끗한 마음을 주소서. 나의 모든 죄악과 알량한 지식과 세상 철학을 모두 십자가에 못 박고 주님 앞에 나아가기 원합니다. 나의 경험과 지식은 완전하지 않습니다. 완전했다면 실패도 후회도 없었을 것입니다. 주님 외에는 나를 온전히 인도하실 분이 없습니다. 나를 온전히 주님의 길로 들어가게 하소서. 참 진리이신 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"내 아들아 너는 듣고 지혜를 얻어 네 마음을 바른 길로 인도할지니라",
    ref:"— 잠언 23:19"
  },
  // ── Day 12 : 4월 16일 ──
  12:{
    title:"오늘의 기쁨을 놓치지 않게 하소서",
    body:`시간의 주인이신 하나님 아버지, 새로운 날을 주시니 감사합니다. 나의 모든 시간이 주님의 손안에 있음을 고백합니다. 매 순간 나를 붙드시고 올바른 길로 인도하여 주소서.\n\n좋은 미래를 위해 현재에 충실하기 원합니다. 내일만 바라보다가 정작 오늘을 놓치는 일이 없게 하소서. 오늘을 기쁘게 살고, 또 내일을 기쁘게 산다면 나의 인생은 기쁨으로 가득할 것입니다.\n\n기쁨을 내일로 미루고 오늘은 고통만 생각하지 않게 하소서. 주님이 주신 구원의 기쁨은 미룰 것이 아니라 오늘 누려야 하는 기쁨입니다. 기쁨으로 찬양하는 나로 인해 주님이 기뻐하시는 하루 되게 하소서. 매 순간 주님을 느끼는 행복한 날 되기 원합니다. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"그러므로 내일 일을 위하여 염려하지 말라 내일 일은 내일이 염려할 것이요 한 날의 괴로움은 그 날로 족하니라",
    ref:"— 마태복음 6:34"
  },
  // ── Day 13 : 4월 17일 ──
  13:{
    title:"나를 진정 위로할 분은 주님뿐입니다",
    body:`위로의 하나님 아버지, 이 아침에 눈을 뜨게 하시니 감사합니다.\n\n나는 하나님의 도우심이 아니면 금방 고장 나는 연약한 인간입니다. 내 몸이 정상적으로 움직이게 하시니 감사합니다. 육체의 아픔뿐 아니라 마음의 병에도 무관심하지 않게 하소서. 상처받고도 아닌 척 하다가 결국 하나님을 원망하지 않게 하소서.\n\n아버지는 삶과 죽음을 넘어서 나의 영원한 아군이십니다. 사람들은 모두 나를 버려도 주님은 절대 나를 버리지 않으십니다. 사람에게 받은 상처를 진정 위로하고 회복하시는 분도 하나님뿐이십니다. 주님으로 인해 오늘도 살아갈 힘을 얻습니다. 변치 않는 주님의 사랑을 배우게 하소서. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"하나님이 능히 모든 은혜를 너희에게 넘치게 하시나니 이는 너희로 모든 일에 항상 모든 것이 넉넉하여 모든 착한 일을 넘치게 하게 하려 하심이라",
    ref:"— 고린도후서 9:8"
  },
  // ── Day 14 : 4월 18일 ──
  14:{
    title:"작은 일에 흔들리지 않는 믿음",
    body:`나의 하나님 아버지, 귀한 하루를 선물로 주셔서 감사합니다.\n\n나의 전부이며 소망이신 주님을 찬양합니다. 주님께서 하신 모든 일이 선하심을 믿습니다.\n\n오늘 하루, 작은 일에 흔들리지 않는 믿음을 구합니다. 중요하지 않은 일에 매여 마음을 모두 내주는 일이 없게 하소서. 본질이 아닌 것에 속을 끓이고 미움을 품지 않게 하소서. 작은 일은 작은 일로 넘기는 여유를 허락하소서. 작은 일을 크게 보는 나쁜 습관을 버리기 원합니다.\n\n주님의 자녀가 얼마나 풍성한 존재인지 알고 스스로 채우지 않아도 된다는 여유와 자유를 허락하소서. 나의 공급자 되시는 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"우리 주 예수 그리스도의 은혜를 너희가 알거니와 부요하신 이로서 너희를 위하여 가난하게 되심은 그의 가난함으로 말미암아 너희를 부요하게 하려 하심이라",
    ref:"— 고린도후서 8:9"
  },
  // ── Day 15 : 4월 19일 ──
  15:{
    title:"하나님의 선하심이 더 큽니다",
    body:`만물의 하나님, 모든 것을 만들고 운행하시는 아버지, 오늘도 나와 내 주변의 모든 것을 통치하심에 감사합니다.\n\n오늘 만나는 악한 세상 가운데 하나님의 선하심을 발견하기 원합니다. 나를 둘러싼 악보다 나를 둘러싼 하나님의 선하심이 더 큽니다. 하나님의 선하심 덕분에 오늘 내가 살아 있음을 알고 감사하게 하소서. 오늘도 하나님의 섭리를 따라 살겠습니다. 기계처럼 목표를 향해 매진하다 병들지 않게 하소서. 열심히 일하되 쉬어야 할 때는 쉬는 것이 책임 있게 사는 것임을 알게 하소서.\n\n오늘 만나는 모든 사람들을 축복합니다. 나를 보내신 그곳에 하나님의 위로가 임하게 하소서. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"우리가 알거니와 하나님을 사랑하는 자 곧 그의 뜻대로 부르심을 입은 자들에게는 모든 것이 합력하여 선을 이루느니라",
    ref:"— 로마서 8:28"
  },
  // ── Day 16 : 4월 20일 ──
  16:{
    title:"주님은 가장 좋은 것을 주십니다",
    body:`약속의 하나님, 오늘도 신실하게 나를 보호하셔서 주님을 찬양하게 하시니 감사합니다.\n\n아버지는 언제나 신실하셔서 모든 약속을 지키십니다. 나는 기도하고도 잊어버리는 것이 많은데, 주님은 단 한 번도 약속을 잊지 않으시고 나에게 가장 좋은 것을 주십니다. 그것도 가장 좋은 때를 고르고 골라 주시니 참 감사합니다.\n\n아버지의 선택이 가장 좋은 선택임을 믿습니다. 내가 마음이 조급해 하나님이 주시지 않는다 원망하지 않게 하소서. 하나님을 신뢰함으로 하나님의 때를 기다리며, 하나님이 무엇을 주시든 순종하는 마음으로 받게 하소서. 오늘도 선하신 주님의 인도하심이 나를 지킬 것입니다. 신실하신 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"주는 나의 하나님이시니 나를 가르쳐 주의 뜻을 행하게 하소서 주의 영은 선하시니 나를 공평한 땅에 인도하소서",
    ref:"— 시편 143:10"
  },
  // ── Day 17 : 4월 21일 ──
  17:{
    title:"모든 것을 주님의 손에 맡깁니다",
    body:`오늘도 일하시는 하나님, 주님께서 주신 이 아침에 감사를 드립니다.\n\n내가 쉴 때도 내가 일할 때도 나보다 먼저 나를 위해 일하시니 감사합니다. 나의 열심은 때로 좋지 않은 열매를 맺기도 하지만, 주님은 언제나 온전한 열매를 거두십니다. 주님께 모든 것을 맡기니 일하시고 인도하여 주소서.\n\n오늘은 무엇보다 나의 자녀의 삶을 주님의 손에 올려드립니다. 내 자녀이니 내가 주님보다 더 잘 알고 잘 보살필 수 있다 착각하며 교만하지 않게 하소서. 나의 자녀도 주님이 만드셨으니 주님의 것입니다. 주님의 손에서 더 큰 은혜 가운데 자라게 하소서. 우리의 주인 되시는 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"그런즉 심는 이나 물 주는 이는 아무 것도 아니로되 오직 자라게 하시는 이는 하나님뿐이니라",
    ref:"— 고린도전서 3:7"
  },
  // ── Day 18 : 4월 22일 ──
  18:{
    title:"말씀 앞에 나를 내려놓게 하소서",
    body:`나를 깨우시는 하나님 아버지, 좋은 아침에 눈뜨게 하시니 감사합니다.\n\n오늘 나의 삶 가운데 주님의 은혜가 더욱 임하기 원합니다. 안식 가운데 가장 큰 안식은 주님을 만나는 것임을 기억하고 기대하게 하소서.\n\n거울을 보듯 말씀 앞에서 나 자신을 바라보기 원합니다. 징계의 말씀도 감사로 받게 하소서. 잘못된 걸음을 바로잡아 주시는 주님의 은혜를 기쁨으로 받겠습니다. 오늘 주님의 뜻 앞에 온전히 서게 하소서. 내가 듣기 원하는 말씀이 아니라, 하나님께서 하기 원하시는 말씀 앞에 나의 생각을 내려놓기 원합니다. 그 말씀을 경청하고 따르게 하소서. 오늘 서고 앉고 가는 모든 행동이 주님의 말씀에 근거하게 하소서. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"훈계 받기를 싫어하는 자는 자기의 영혼을 경히 여김이라 견책을 달게 받는 자는 지식을 얻느니라",
    ref:"— 잠언 15:32"
  },
  // ── Day 19 : 4월 23일 ──
  19:{
    title:"하나님의 사랑받는 자녀답게",
    body:`사랑의 하나님 아버지, 새로운 하루를 주시니 감사합니다.\n\n오늘도 나를 사랑으로 바라보시는 하나님을 기억하기 원합니다. 나를 기뻐하시고, 아끼시며, 사랑하시는 아버지를 생각하며 힘을 내게 하소서. 사람들에게 사랑받는다는 확신이 없을 때도 한결같이 나를 사랑하시는 주님의 사랑을 붙잡고 힘 있게 출발하겠습니다. 하나님의 사랑받는 자녀라는 사실이 나의 가장 견고한 정체성이 되게 하소서.\n\n나는 하나님의 사랑받는 자녀이니 누구를 만나든 상처받지 않게 하소서. 누가 뭐라고 하든 나의 존귀함은 달라지지 않음을 알고, 하루 종일 주님을 찬양하며 주님으로 인해 기뻐하겠습니다. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"하늘로부터 소리가 있어 말씀하시되 이는 내 사랑하는 아들이요 내 기뻐하는 자라 하시니라",
    ref:"— 마태복음 3:17"
  },
  // ── Day 20 : 4월 24일 ──
  20:{
    title:"하나님의 때를 신뢰합니다",
    body:`응답하시는 하나님, 새날을 허락하시니 감사합니다.\n\n나는 날씨만 흐려도 우울해지는 연약한 인간입니다. 환경에 흔들리는 자신을 보면 실망스럽지만, 언제나 환경을 뛰어넘어 나를 지키시는 하나님을 보며 소망을 품습니다.\n\n오늘 나의 기도가 하나님을 닮기 원합니다. 줄 수 있으나 모두 주지 않으시는 하나님의 사랑을 알게 하소서. 지금 당장 돕지 않으시는 하나님의 때를 알게 하소서. 하나님의 뜻을 알아 아름다운 열매로 응답받는 기도를 드리기 원합니다. 힘든 환경은 빨리 벗어나는 것이 지혜라는 단순한 생각을 버리고 하나님의 때를 기다리며 인내하겠습니다. 나의 길이 되시는 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"하나님이 모든 것을 지으시되 때를 따라 아름답게 하셨고 또 사람들에게는 영원을 사모하는 마음을 주셨느니라 그러나 하나님이 하시는 일의 시종을 사람으로 측량할 수 없게 하셨도다",
    ref:"— 전도서 3:11"
  },
  // ── Day 21 : 4월 25일 ──
  21:{
    title:"하나님 나라가 이 땅에 임하기를",
    body:`자비의 하나님 아버지, 오늘도 나를 깨우시고 일으키시니 감사합니다.\n\n오늘도 선하신 아버지의 인도를 구합니다. 나의 열심 때문에 주님보다 앞서 가지 않게 하시고, 나의 게으름 때문에 주님이 안 보일 만큼 뒤처지지 않게 하소서. 언제나 아버지 등 뒤에서 안전하게 따라가게 하소서.\n\n이 나라를 위해 기도합니다. 하나님의 정의가 실현되는 나라 되게 하소서. 약한 자를 돌보고 부족한 자들과 나누며 평화를 이루는, 온전한 하나님 나라가 임하기 원합니다. 회개하는 마음으로 하나님 앞에 서는 나라 되기 원합니다. 나부터 다음 세대에게 본이 되는 어른 되게 하소서. 비록 내게는 좋은 본이 없었더라도 나는 온전한 길로 들어서는 용감한 사람 되겠습니다. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"이르시되 때가 찼고 하나님의 나라가 가까이 왔으니 회개하고 복음을 믿으라 하시더라",
    ref:"— 마가복음 1:15"
  },
  // ── Day 22 : 4월 26일 ──
  22:{
    title:"영혼을 아름답게 하는 하루",
    body:`사랑의 하나님 아버지, 오늘도 나를 새롭게 하시니 감사합니다.\n\n아침에 일어나 세안을 하듯, 나의 영혼 또한 정돈하기 원합니다. 외모를 가꾸지 않고는 출근도 외출도 하지 않으면서 영혼을 가꾸는 것에는 무관심한 것을 용서하소서. 영혼이 더 아름다워지는 아침을 보내고 힘차게 하루를 시작하기 원합니다.\n\n오늘은 주님을 사랑하기에 더 도전하고 시험을 만날 때 굳건하게 하소서. 주님을 믿음으로 이기게 하시고, 주님을 사랑함으로 원수를 사랑하게 하소서. 주님을 신뢰함으로 하나님께서 옮기실 때까지 기다리게 하소서. 나의 말과 마음과 행동에 진보가 있는 하루 되기 원합니다. 나의 주 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"이것을 너희에게 이르는 것은 너희로 내 안에서 평안을 누리게 하려 함이라 세상에서는 너희가 환난을 당하나 담대하라 내가 세상을 이기었노라",
    ref:"— 요한복음 16:33"
  },
  // ── Day 23 : 4월 27일 ──
  23:{
    title:"이 나라가 평화로운 땅 되게 하소서",
    body:`평화의 하나님 아버지, 이 아침에 평안히 눈을 뜨게 하심에 감사드립니다.\n\n사랑하는 가족들과 편히 쉬고 누울 집이 있는 것도 이 나라에 평화가 있기에 가능한 일임을 고백합니다. 우리 자녀들에게 조금 더 안전한 나라, 더욱 공정한 나라, 생명을 소중히 여기는 나라, 무엇보다 하나님의 평화가 가득한 나라를 물려주기 원합니다. 사람을 도구로 이용하지 않고 귀히 여기는 나라 되게 하소서.\n\n하나님의 방식대로, 하나님의 인도하심대로 이 나라가 평화의 땅 되기 원합니다. 모두가 한마음으로 기도하며 모든 이권을 내려놓고 서로의 상처를 부둥켜안게 하소서. 주님께서 이 나라를 온전히 회복하시리라 믿습니다. 평화의 왕으로 오신 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"그는 우리의 화평이신지라 둘로 하나를 만드사 원수 된 것 곧 중간에 막힌 담을 자기 육체로 허시고",
    ref:"— 에베소서 2:14"
  },
  // ── Day 24 : 4월 28일 ──
  24:{
    title:"복음이 온 땅에 가득하기를",
    body:`온 땅의 하나님, 오늘도 새날을 주시니 감사합니다. 나의 일거수일투족뿐 아니라 온 세상의 모든 거대한 일을 돌보시는 아버지 감사합니다. 이 땅 가운데 참된 평화가 임하기를 구합니다.\n\n주께서 닫으시면 열 자가 없고, 주께서 여시면 닫을 자가 없습니다. 주님, 닫힌 문을 여셔서 저쪽 땅에도 하나님의 복음이 들어가게 하소서. 우리가 가진 것을 나누게 하소서. 하나님의 섭리 아래 하나 되는 축복이 있기를 구합니다. 주님의 뜻과 때를 기다립니다.\n\n모든 역사의 주인이 되시는 주님께서 오늘 내 삶의 주인이심을 고백합니다. 하루 동안 나의 삶에도 평화를 이루게 하소서. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"화평하게 하는 자들은 화평으로 심어 의의 열매를 거두느니라",
    ref:"— 야고보서 3:18"
  },
  // ── Day 25 : 4월 29일 ──
  25:{
    title:"나의 마음이 어디에 매였는지",
    body:`사랑의 하나님, 나를 선대하셔서 나로 강건하게 하시고, 새날을 시작하게 하시니 감사합니다.\n\n내 안에 소중히 숨겨 놓은 우상들을 가꾸고 지키느라 수많은 시간과 노력을 투자한 것을 회개합니다. 나도 모르게 섬기는 세상의 것이 있다면 이 아침에 다 버리고 오직 주님으로 채우기 원합니다. 나의 마음이 어디에 매여 있는지 돌아보게 하소서.\n\n주님께서 나를 오래 참으셔서 나로 그 사랑 안에 머물게 하시듯 나도 다른 사람들을 오래 참게 하소서. 주님께서 하나님의 때에 그들 안에 이루실 역사를 기대합니다. 오늘도 하나님과 만남으로 즐겁고 행복한 날 되게 하소서. 나의 기쁨이 되시는 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"내게로 돌이키사 내게 은혜를 베푸소서 주의 종에게 힘을 주시고 주의 여종의 아들을 구원하소서",
    ref:"— 시편 86:16"
  },
  // ── Day 26 : 4월 30일 ──
  26:{
    title:"베풀며 만족하는 풍성한 삶",
    body:`나를 도우시는 하나님 아버지, 아침을 주심에 감사합니다.\n\n오늘 주님께서 내게 인자를 베푸시듯 나도 사람들에게 인자를 베풀기 원합니다. 가난한 자를 돕고, 부족한 자를 채우게 하소서. 하나님은 나를 풍성하게 하시는 분이시니 흘려보낸 만큼 더욱 풍성하게 하실 줄 믿습니다. 모든 욕심을 내려놓고 나의 마음을 하나님으로 가득 채우게 하소서. 주고도 만족하는 진정 풍성한 삶으로 들어가게 하소서.\n\n오늘도 주신 것에 감사하고, 받은 책임에 감사하겠습니다. 큰 부담이 있다면 그만큼 많은 기대를 받고 있음에 감사하게 하소서. 관점을 바꾸면 감사하지 않은 것이 없습니다. 나의 도움이 되시는 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"여호와께 감사하라 그는 선하시며 그 인자하심이 영원함이로다",
    ref:"— 시편 136:1"
  },
  // ── Day 27 : 5월 1일 ──
  27:{
    title:"나를 잊지 않고 지키시는 주님",
    body:`나를 인도하시는 하나님 아버지, 이 아침에 주님을 찬양합니다.\n\n오늘 무슨 일이 일어날지 알 수 없지만, 두려워하지 않는 것은 주님이 나의 길을 앞서 가시기 때문입니다. 비록 내가 하나님을 잊는 순간이 있더라도 하나님은 내가 어디에서 무엇을 하든지 절대 잊지 않으십니다. 나는 잊어도 주님은 언제나 나를 눈동자와 같이 지키십니다.\n\n오늘도 구름 기둥과 불 기둥으로 나를 인도하소서. 주님이 인도하시면 따라가고, 주님이 멈추시면 멈추겠습니다. 주님이 쉬라 하시면 쉬고, 주님이 달리라 하시면 달리겠습니다. 아버지께 의존하는 하루 되게 하소서. 오늘도 나의 삶이 주님의 뜻을 이루기 원합니다. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"나를 눈동자 같이 지키시고 주의 날개 그늘 아래에 감추사",
    ref:"— 시편 17:8"
  },
  // ── Day 28 : 5월 2일 ──
  28:{
    title:"오늘에 적합한 은혜 주심에 감사합니다",
    body:`놀라운 하나님 아버지, 오늘도 새로운 기회를 허락하시니 감사합니다.\n\n오늘도 나에게 하신 약속이 모두 이루어질 줄 믿습니다. 오늘에 적합한 은혜를 아낌없이 주시는 하나님을 찬양합니다.\n\n죽기까지 아들을 내주신, 우리에게 모든 것을 주신 하나님을 마치 조르지 않으면 작은 것 하나도 쉬이 주시지 않는 인색한 분으로 여기고 원망하는 것을 용서하소서. 오늘도 더 주지 못해서 안타까워하시는, 어서 주고 싶지만 가장 좋은 결과를 위해 더 좋은 때를 기다렸다 주시는 하나님의 사랑에 감사합니다. 나보다 더 내가 풍성한 삶을 살기 원하시는 하나님의 사랑에 잠기는 하루 되기 원합니다. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"너희가 악한 자라도 좋은 것으로 자식에게 줄 줄 알거든 하물며 하늘에 계신 너희 아버지께서 구하는 자에게 좋은 것으로 주시지 않겠느냐",
    ref:"— 마태복음 7:11"
  },
  // ── Day 29 : 5월 3일 ──
  29:{
    title:"하나님의 거절도 은혜입니다",
    body:`사랑으로 다스리시는 하나님, 오늘도 가장 먼저 주님을 기억하게 하시니 감사합니다.\n\n언제나 나의 가는 길을 지켜 주시는 아버지, 내가 잘못된 길로 가려 할 때 그 길에 들어서지 못하게 막아 주심을 감사합니다. 내가 죄를 지을 때 그것이 죄인 줄 알도록 나를 징계하심을 감사합니다. 모두가 주님이 나의 삶을 다스리신다는 증거입니다. 주님의 징계는 나를 향한 하나님의 사랑임을 믿고 감사하게 하소서.\n\n내가 원하는 대로 모두 하는 것이 얼마나 위험한 일인지 깨닫기 원합니다. 하나님의 거절 또한 나에게 은혜임을 믿습니다. 그것이 안전한 길이기에 싫은 길도 가게 하시는 하나님을 신뢰합니다. 나를 사랑하시는 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"내 아들아 여호와의 징계를 경히 여기지 말라 그 꾸지람을 싫어하지 말라",
    ref:"— 잠언 3:11"
  },
  // ── Day 30 : 5월 4일 ──
  30:{
    title:"작은 것 하나부터 순종하는 하루",
    body:`나의 하나님 아버지, 귀한 하루를 시작하게 하시니 감사합니다.\n\n주님께서 하시는 모든 말씀 앞에 순종하는 하루 되기 원합니다. 하나님을 사랑한다고 하면서 말씀대로 살지 않는 것을 회개합니다. 말씀 따로 삶 따로 사는 나의 모습을 인정하고 돌이키게 하소서. 이미 알고 있는 말씀부터 하나씩 따르며 하나님께 순종하기 원합니다. 힘들어도, 남들이 지키지 않아도, 말씀에 순종하기를 포기하지 않게 하소서.\n\n주님께 순종하는 삶을 살도록 아주 작은 것부터 실천에 옮기겠습니다. 내게는 능력이 없으니 주님 도와주소서. 나의 주 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"주의 의로운 규례들을 지키기로 맹세하고 굳게 정하였나이다",
    ref:"— 시편 119:106"
  },
  // ── Day 31 : 5월 5일 ──
  31:{
    title:"다음 세대를 축복하며 기도합니다",
    body:`사랑의 하나님, 좋은 아침을 주셔서 감사합니다.\n\n오늘은 특별히 다음 세대를 위한 소망의 마음으로 기도합니다. 아이들이 어른이 되었을 때 아름답고 정의로운 리더가 되도록 기도로 양육하게 하소서. 나부터 말만 하는 어른이 아니라 행동으로 본을 보이는 어른 되기 원합니다.\n\n앞으로 이 나라에서 살아갈 아이들을 축복합니다. 아이들이 하나님의 사랑을 받는 하나님의 자녀 되게 하소서. 하나님을 사랑하고 하나님께 순종하는 자녀가 되게 하소서. 아이들이 하나님을 자신의 주인으로 알게 되기를 구합니다. 나 또한 그러하기 원합니다. 온 땅의 주인이신 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"자녀들아 우리가 말과 혀로만 사랑하지 말고 행함과 진실함으로 하자",
    ref:"— 요한1서 3:18"
  },
  // ── Day 32 : 5월 6일 ──
  32:{
    title:"하나님이 더 중요합니다",
    body:`강하신 하나님 아버지, 모든 것의 주인이신 아버지께서 나를 깨우시니 감사합니다.\n\n귀한 하루 동안 주 안에서 안식하기 원합니다. 몸만 쉬는 것이 아니라 영혼도 안식하기 원합니다. 무엇이 몸과 마음과 영혼을 위한 참된 안식인지 배우게 하소서. 무엇보다 주님 앞에 나아가기를 소홀히 하지 않기 원합니다. 하루 종일 중요하고 급하다는 일들을 위해 많은 시간을 내면서 하나님을 위해서는 삼십 분도 내지 않는 것을 회개합니다. 오늘은 내가 맡은 일보다 하나님을 더욱 중요하게 여기게 하소서.\n\n다른 모든 의지하는 것들을 내려놓습니다. 오직 주님만 나를 지켜 주소서. 강하신 하나님께 모든 것을 맡깁니다. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"오직 나는 주의 풍성한 사랑을 힘입어 주의 집에 들어가 주를 경외함으로 성전을 향하여 예배하리이다",
    ref:"— 시편 5:7"
  },
  // ── Day 33 : 5월 7일 ──
  33:{
    title:"가족을 주심에 감사합니다",
    body:`사랑의 하나님 아버지, 귀한 날 허락하여 주심에 감사합니다.\n\n오늘은 형제자매를 돌보는 하루 되기를 소망합니다. 주님께서 가족을 주심에 감사합니다. 부모님이 계시기에 내가 존재하고, 내가 존재하기에 나의 자녀도 존재합니다. 세상에 나 혼자 존재하는 것처럼 나만 생각하지 않게 하소서. 마치 아무 도움 없이 혼자 자란 양 자만하지 않게 하소서.\n\n인생의 많은 순간, 내가 기억하지 못하는 도움의 손길이 있었습니다. 기억하고 또 기억하지 못하는 모든 도움에 감사하며, 나도 다른 사람에게 도움을 베풀며 살기 원합니다. 자선하는 마음이 아니라 빚을 갚는 마음으로 사랑을 베풀게 하소서. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"주의 성도들아 여호와를 찬송하며 그의 거룩함을 기억하며 감사하라",
    ref:"— 시편 30:4"
  },
  // ── Day 34 : 5월 8일 ──
  34:{
    title:"주님의 말씀이 기억나게 하소서",
    body:`나에게 말씀하시는 하나님, 이 아침에 주님께 사랑을 고백합니다.\n\n오늘도 길을 갈 때, 일할 때, 운전할 때, 쉴 때 주님의 말씀이 떠오르기 원합니다. 성경을 통해 하신 수많은 말씀을 옆에 두고도 하나님이 내게 말씀하지 않으신다는 어리석은 생각을 버리게 하소서.\n\n주님이 주신 명령과 지침들을 이미 성경을 통해 알고 있으면서 다만 순종하기 싫어 모르는 척하며 다른 말씀을 구하는 것 회개합니다. 하나님의 뜻을 모르는 것이 아니라 행하고 싶지 않은 것이면서 하나님이 내게 침묵하신다고 변명하지 않게 하소서. 모든 상황 속에 떠오르는 주님의 명령에 순종하기 원합니다. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"오직 내가 이것을 그들에게 명령하여 이르기를 너희는 내 목소리를 들으라 그리하면 나는 너희 하나님이 되겠고 너희는 내 백성이 되리라 너희는 내가 명령한 모든 길로 걸어가라 그리하면 복을 받으리라 하였으나",
    ref:"— 예레미야 7:23"
  },
  // ── Day 35 : 5월 9일 ──
  35:{
    title:"평화와 기쁨의 통로가 되게 하소서",
    body:`나의 하나님 아버지, 오늘도 귀한 날을 주시니 감사합니다.\n\n하나님께서 모든 것을 운행하심을 믿습니다. 인간의 힘으로 할 수 없는 모든 것을 주님은 일상처럼 하실 수 있습니다. 오늘도 이 땅에 주님이 주시는 평화가 임하기 원합니다. 내가 머무는 모든 곳에서 내가 화평하게 하는 자가 되기 원합니다. 문제를 만드는 사람이 아니라 문제를 해결하는 사람이 되게 하소서.\n\n평안이 없는 곳에 내가 평안을 부르는 사람이 되기 원합니다. 기쁨이 없는 곳에 기쁨의 통로가 되기 원합니다. 나라는 통로를 통해 하나님이 주시는 기쁨이 이 세상에 퍼지게 하소서. 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"내게 주신 영광을 내가 그들에게 주었사오니 이는 우리가 하나가 된 것 같이 그들도 하나가 되게 하려 함이니이다",
    ref:"— 요한복음 17:22"
  },
  // ── Day 36 : 5월 10일 ──
  36:{
    title:"하나님을 알수록 더욱 커지는 믿음",
    body:`나의 주인이신 하나님 아버지, 좋은 날을 주시니 감사합니다.\n\n오늘도 하나님을 더욱 알아가는 하루 되기 원합니다. 하나님은 나의 문제보다 크신데, 내가 아는 하나님은 너무 작습니다. 더 크신 하나님을 알기 원합니다. 하나님을 알수록 더 큰 믿음으로 나아갈 줄 믿습니다. 하나님을 더 아는 만큼 더 많이 닮아가게 하소서.\n\n새롭게 주신 하루를 기대하기 원합니다. 늘 똑같은 일상에 사라진 기대감을 회복하게 하소서. 만나는 모든 사람, 모든 환경 속에 일하실 하나님을 기대하며 감사하게 하소서. 내 삶 가운데 끊이지 않는 하나님의 동행하심을 기뻐하는 하루 보내겠습니다. 나의 주 예수 그리스도의 이름으로 기도합니다. 아멘!`,
    scripture:"그러므로 우리가 여호와를 알자 힘써 여호와를 알자 그의 나타나심은 새벽 빛 같이 어김없나니 비와 같이, 땅을 적시는 늦은 비와 같이 우리에게 임하시리라 하니라",
    ref:"— 호세아 6:3"
  },
  // ── Day 37 : 5월 11일 ──
  37:{
    title:"작은 나를 돌보시는 하나님의 사랑",

/* ══════════════════════════════
   날짜 잠금 판별
══════════════════════════════ */
function isUnlocked(dayObj){
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dayObj.date);d.setHours(0,0,0,0);
  return d<=today;
}
function isToday(dayObj){
  const today=new Date();
  return dayObj.date.getFullYear()===today.getFullYear()
    &&dayObj.date.getMonth()===today.getMonth()
    &&dayObj.date.getDate()===today.getDate();
}

/* ══════════════════════════════
   목록 렌더
══════════════════════════════ */
function renderList(){
  const wrap=document.getElementById('list-scroll');
  let html=`<div class="day-grid">`;
  DAYS.forEach(d=>{
    const unlocked=isUnlocked(d),tod=isToday(d);
    const cls=tod?'today':unlocked?'unlocked':'locked';
    const past=unlocked&&!tod?' past':'';
    const lock=!unlocked?`<span class="di-lock">🔒</span>`:'';
    const dot=unlocked?`<span class="di-dot"></span>`:'';
    const onclick=unlocked?`onclick="openDay(${d.index})"`:'' ;
    html+=`<div class="day-item ${cls}${past}" ${onclick}>
      ${lock}
      <span class="di-num">${d.dayNum}</span>
      <span class="di-date">${d.label}</span>
      ${dot}
    </div>`;
  });
  html+=`</div>`;
  wrap.innerHTML=html;
}

/* ══════════════════════════════
   묵상 내용 렌더
══════════════════════════════ */
let curDay=0;
function openDay(index){
  curDay=index;
  renderDay(index);
  goPage('devotion');
}
function renderDay(index){
  const d=DAYS[index];
  const area=document.getElementById('scroll-area');
  document.getElementById('db-date').textContent=d.display;
  document.getElementById('db-num').textContent=d.dayNum;
  const pct=Math.max(2,Math.round((d.dayNum/50)*100));
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=`${d.dayNum} / 50`;

  // 이전/다음 버튼
  document.getElementById('btn-prev').disabled=index<=0||!isUnlocked(DAYS[index-1]);
  document.getElementById('btn-next').disabled=index>=49||!isUnlocked(DAYS[index+1]);

  // 잠금 여부
  if(!isUnlocked(d)){
    area.innerHTML=`<div class="lock-card">
      <div class="lock-icon">🔒</div>
      <div class="lock-title">${d.fullDate}</div>
      <div class="lock-msg">이 날의 묵상은<br>아직 열리지 않았어요.</div>
      <div class="lock-date">${d.label} 에 다시 방문해 주세요</div>
    </div>`;
    return;
  }

  const c=CONTENT[d.dayNum];
  if(!c){
    area.innerHTML=`<div class="lock-card">
      <div class="lock-icon">✍️</div>
      <div class="lock-title">${d.fullDate}</div>
      <div class="lock-msg">묵상 내용이 곧 업로드됩니다.<br>조금만 기다려 주세요.</div>
      <div class="lock-date">Day ${d.dayNum}</div>
    </div>`;
    return;
  }

  area.innerHTML=`<div class="card" id="dv-card">
    <div class="card-top"></div>
    <div class="card-head">
      <div class="dev-date">${d.fullDate}</div>
      <div class="dev-title">${c.title}</div>
      <div class="title-deco">
        <div class="tdl"></div>
        <svg width="14" height="14" viewBox="0 0 24 24"><rect x="10" y="2" width="4" height="20" rx="1" fill="#B8892A"/><rect x="3" y="8" width="18" height="4" rx="1" fill="#B8892A"/></svg>
        <div class="tdr"></div>
      </div>
    </div>
    <div class="card-body">
      <p class="dev-text">${c.body}</p>
      ${c.scripture?`<div class="scripture-box">
        <div class="sc-label">✦ 오늘의 말씀</div>
        <p class="sc-text">${c.scripture}</p>
        <div class="sc-ref">${c.ref||''}</div>
      </div>`:''}
    </div>
  </div>`;
  area.scrollTop=0;
}
function changeDay(dir){
  const next=curDay+dir;
  if(next<0||next>49||!isUnlocked(DAYS[next]))return;
  curDay=next;renderDay(curDay);
  document.getElementById('scroll-area').scrollTop=0;
}

/* ══════════════════════════════
   페이지 전환
══════════════════════════════ */
const PAGES=['cover','list','devotion'];
const ORDER={cover:0,list:1,devotion:2};
let curPage='cover';
function goPage(to){
  const fromEl=document.getElementById(curPage);
  const toEl  =document.getElementById(to);
  const goRight=ORDER[to]>ORDER[curPage];
  fromEl.classList.remove('active');
  fromEl.classList.add(goRight?'hidden-left':'hidden-right');
  toEl.classList.remove('hidden-left','hidden-right');
  toEl.classList.add('active');
  curPage=to;
  if(to==='list')renderList();
}

/* ══ 초기화 ══ */
renderList();
</script>
